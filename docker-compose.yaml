#Only use if you want a quick database setup for local development

services:
  db:
    image: postgres:14.3
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    container_name: orcoma
    volumes:
      - ./postgres:/var/lib/postgresql/data